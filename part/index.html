<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style/style.css">
  <title>TechWave - Podcast Website</title>
</head>
<body>
    
  
  <!-- ========================================== -->
  <header class="navbar">
    <div class="logo">Tech<span>Wave</span></div>

    

    <nav class="nav-links">
      <a href="#about">About</a>
      <a href="#features">Why Listen</a>
      <a href="#episodes">Episodes</a>
      <a href="#host">Host</a>
    </nav>

    <button class="subscribe-btn">
      Subscribe <span class="arrow">→</span>
    </button>
  </header>

  
  <!-- ========================================== -->
  <section class="hero">
    <img src="../assets/hero-bg.png" class="hero-bg" alt="">

    <div class="hero-content">
      
      
      <div class="microphone-container">
        
        <img src="../assets/hero-circle.png" class="circle-bg-asset" alt="">
        <div class="inner-mic-circle">
          <img src="../assets/microphone.png" class="mic-icon-asset" alt="">
        </div>
        <span class="new-badge">New</span>
      </div>

      <h1>Tech<span>Wave</span></h1>
      <p>Daily tech insights, productivity hacks & growth tips</p>

      <div class="hero-buttons">
        <button class="btn-primary">Listen Now</button>
        <button class="btn-secondary">Subscribe</button>
      </div>
    </div>
  </section>


  <!-- ========================================== -->
  <footer>
    <img src="../assets/footer-bg.png" class="footer-bg" alt="">

    <div class="footer-content">
      <div class="logo">Tech<span>Wave</span></div>
      <div class="image">
        <a rel="https://spotify.com" target="_blank"><img src="../assets/spotify.png" alt="Spotify"><span>spotify</span></a>
        <a rel="https://applepodcasts.com" target="_blank"><img src="../assets/apple-podcast.png" alt="Apple Podcasts"><span>apple podcast</span></a>
        <a rel="https://youtube.com" target="_blank"><img src="../assets/youtube.png" alt="YouTube"><span>youtube</span></a>
        <a rel="https://twitter.com" target="_blank"><img src="../assets/twitter.png" alt="Twitter"><span>twitter</span></a>
      </div>
     
      <p>© 2026 TechWave. All structural layout assignment rights reserved.</p>
    </div>
  </footer>

</body>
</html>
