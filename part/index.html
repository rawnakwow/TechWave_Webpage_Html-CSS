<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/style.css">


    
    
    <title>TechWave - Podcast Website</title>

<style>


    *{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}


body{
  background:#1A0B2E;
  color:white;
}

/* NAVBAR */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 60px;
}

.logo span{ color:#ff2ec4; }

.subscribe-btn{
  background:linear-gradient(45deg,#F7E93F,#FB09B4,#9100F8);
  padding:10px 18px;
  border-radius:20px;
  border:none;
  color:white;
}

footer{
  text-align:center;
  padding:40px;
  background:#0d0618;
}







</style>



</head>



<body>
    
<header class="navbar">
  <div class="logo">Tech<span>Wave</span></div>

  <nav>
    <a href="#">About</a>
    <a href="#">Episodes</a>
    <a href="#">Host</a>
  </nav>


  <button class="subscribe-btn">
    Subscribe <span class="arrow">→</span>
</button>


</header>



<!-- Hero Section -->
<section class="section-1">
  <div class="hero-content">

    <h1>Tech<span>Wave</span></h1>
    <p>Your daily dose of tech insights, productivity hacks, and personal growth</p>

    <div class="hero-image">
      <img src="assets/hero-circle.png" class="circle" alt="">
      <img src="assets/microphone.png" class="mic" alt="">
      <span class="new-bg">New</span>
    </div>

    <div class="buttons">
      <button class="btn-primary">Listen Now</button>
      <button class="btn-secondary">Subscribe</button>
    </div>

  </div>
</section>








 <footer>
  <div class="logo">Tech<span>Wave</span></div>

  <p>© 2026 TechWave. All rights reserved.</p>
</footer>






</body>
</html>
